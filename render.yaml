services:
  # 1. Backend Web Service (Node.js/Express)
  - type: web
    name: caulong-pro-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: caulong-pro-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true

  # 2. Frontend Static Site (React/Vite)
  - type: web
    name: caulong-pro-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: caulong-pro-backend
          property: host

databases:
  # 3. PostgreSQL Database (Free Tier)
  - name: caulong-pro-db
    plan: free
